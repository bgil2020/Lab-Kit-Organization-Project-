{% extends 'base.html' %}
{% block title %}Report Damage{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
        <h2>Report a Damaged Component</h2>
        <p>Use this form to flag a component that is broken, missing, or in poor condition.</p>
    </div>
</div>

<div class="form-card">
    <form action="{{ url_for('damage_report') }}" method="POST">

        <div class="form-group">
            <label for="component_id">Affected Component</label>
            <select id="component_id" name="component_id" required>
                <option value="" disabled selected>Select a component...</option>
                {% for comp in components %}
                <option value="{{ comp.component_id }}">
                    {{ comp.component_name }} (Kit ID: {{ comp.kit_id }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description of Damage</label>
            <textarea id="description" name="description" rows="5"
                      placeholder="Describe what is wrong with the component..."
                      required></textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Submit Report</button>
        </div>

    </form>
</div>

{% endblock %}
